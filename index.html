<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>勉強集中サイト</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
  }
  #bg-a, #bg-b {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    transition: opacity 1.5s ease-in-out;
  }
  #bg-a { z-index: 1; opacity: 1; }
  #bg-b { z-index: 2; opacity: 0; }

  /* 将来ここに予定表示エリアを重ねる予定 */
  #overlay {
    position: fixed;
    inset: 0;
    z-index: 10;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="bg-a"></div>
<div id="bg-b"></div>
<div id="overlay"></div>

<script>
  // 6枚の背景画像(このファイルと同じフォルダに置いてあるもの)
  const IMAGES = [
    "range-mountain-environmental-journey-tranquil-concept.jpg",
    "daigo-ji-temple-autumn-kyoto-japan.jpg",
    "godafoss-waterfall-sunset-winter-iceland.jpg",
    "fuji-mountain-kawaguchiko-lake-morning-autumn-seasons-fuji-mountain-yamanachi-japan.jpg",
    "scenic-travel-peak-green-rivers-reflection.jpg",
    "beautiful-landscape-mountain-fuji.jpg"
  ];

  // その年の何日目かを計算し、6枚をローテーション
  function dayOfYear(date) {
    const start = new Date(date.getFullYear(), 0, 0);
    const diff = date - start;
    return Math.floor(diff / 86400000);
  }

  function todaysImage() {
    const idx = dayOfYear(new Date()) % IMAGES.length;
    return IMAGES[idx];
  }

  const bgA = document.getElementById("bg-a");
  bgA.style.backgroundImage = `url("${todaysImage()}")`;

  // 深夜0時をまたいだら自動で切り替える(ページを開きっぱなしでもOK)
  let currentImage = todaysImage();
  setInterval(() => {
    const next = todaysImage();
    if (next !== currentImage) {
      const bgB = document.getElementById("bg-b");
      bgB.style.backgroundImage = `url("${next}")`;
      bgB.style.opacity = 1;
      setTimeout(() => {
        bgA.style.backgroundImage = `url("${next}")`;
        bgB.style.opacity = 0;
        currentImage = next;
      }, 1600);
    }
  }, 60 * 1000);
</script>

</body>
</html>
